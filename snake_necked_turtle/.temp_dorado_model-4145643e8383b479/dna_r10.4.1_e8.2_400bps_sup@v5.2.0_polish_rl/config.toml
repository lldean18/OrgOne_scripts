config_version = 3
basecaller_model = "dna_r10.4.1_e8.2_400bps_sup@v5.2.0"
supported_basecallers = [ "dna_r10.4.1_e8.2_400bps_sup@v5.2.0",]

[model]
type = "LatentSpaceLSTM"

[feature_encoder]
type = "ReadAlignmentFeatureEncoder"

[label_scheme]
type = "HaploidLabelScheme"

[model.kwargs]
num_classes = 5
lstm_size = 384
cnn_size = 64
kernel_sizes = [ 1, 17,]
pooler_type = "mean"
use_dwells = false
bases_alphabet_size = 6
bases_embedding_size = 6
bidirectional = false

[feature_encoder.kwargs]
dtypes = [ "",]
tag_keep_missing = false
min_mapq = 1
max_reads = 100
row_per_read = false
include_dwells = false
include_haplotype = false

[model.kwargs.pooler_args]
